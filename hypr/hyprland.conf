#‚ĖĎ‚Ėą‚ĖĎ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚Ėą
bind = $MOD CONTROL, left, changegroupactive, b
bind = $MOD CONTROL, right, changegroupactive, f

