# ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖĎ‚Ėą
# ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚ĖÄ‚ĖĄ‚ĖÄ
env = GDK_BACKEND,wayland,x11
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = XDG_MENU_PREFIX,arch-
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = SDL_VIDEODRIVER,wayland
env = WLR_NO_HARDWARE_CURSORS,1
env = WLR_RENDERER_ALLOW_SOFTWARE,1
env = XCURSOR_THEME,breeze_cursors
env = XCURSOR_SIZE,24 # Set cursor size
env = SSH_AUTH_SOCK,$XDG_RUNTIME_DIR/gcr/ssh # Keyring
env = _JAVA_AWT_WM_NONREPARENTING,1 # Fix java wm bug
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = MOZ_ENABLE_WAYLAND,1 # Set Firefox to Wayland

# ‚Ėą‚ĖÄ‚ĖÄ ‚ĖÄ‚ĖĄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ
# ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖĎ‚Ėą ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖĄ‚ĖĄ
# We killall so that on every reload of hyprland, these apps will restart also.
exec = killall hyprpaper; hyprpaper
exec = killall waybar; waybar

exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = hypridle # Idle dpms and suspend
exec-once = hyprsunset

# ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą
# ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ
monitor = DP-3, 1920x1080@144, 0x0, 1

# ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ
# ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖĄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ
input {
  kb_layout = it
  repeat_rate = 55 # Set characters to repeat on hold every 55ms
  repeat_delay = 375 # Set repeat timeout to 375ms
  follow_mouse = 1
  sensitivity = 0 # -1.0 - 1.0, 0 means no modification
}

# ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚ĖĎ
# ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ
general {
  gaps_out = 4 # Outer monitor gaps
  gaps_in = 2 # Inner window gaps
  border_size = 2 # Set window border width
  col.active_border = 0xff89ddff 0xff7dcfff 0xff7aa2f7 270deg # Set active border colour (gradient)
  col.inactive_border = 0xff414868 # Inactive gray
  allow_tearing = true
}

# ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą
# ‚Ėą‚ĖĄ‚ĖĄ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ ‚ĖĄ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ
cursor {
  sync_gsettings_theme = true
  inactive_timeout = 5
}

# ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ
# ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą ‚Ėą ‚ĖĄ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ
misc {
  on_focus_under_fullscreen = 2 # Leave fullscreen on new window
  disable_hyprland_logo = true # Disable logo on desktop
  disable_splash_rendering = true # Disable startup splashscreen
  animate_mouse_windowdragging = false # Disable windowdragging animations
  mouse_move_focuses_monitor = true
  focus_on_activate = false 
  enable_swallow = false # Enable window swalling
  initial_workspace_tracking = false
}

# ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚ĖĄ‚ĖÄ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą
# ‚Ėą‚ĖĄ‚ĖÄ ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖĄ‚ĖĄ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖÄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą
decoration {
    rounding = 6

    blur {
        enabled = true
        size = 7
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        noise = 0.08
	contrast = 1.5
	#layerrule = blur on, match:namespace wofi # Enable blur on wofi
    }

    shadow {
	    enabled = true
	    color = 0xee1a1a1a
	    range = 5
	    render_power = 5
    }
}

# ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą ‚ĖĄ‚ĖÄ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ
# ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚ĖĄ‚Ėą
animations {
    enabled = 1 # Enable animations

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsIn, 1, 7, myBezier, slide
    animation = windowsOut, 1, 7, myBezier, slide
    animation = windowsMove, 1, 3, default
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, myBezier, slide
}

# ‚Ėą‚ĖĎ‚ĖĎ ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ
# ‚Ėą‚ĖĄ‚ĖĄ ‚Ėą‚ĖÄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ ‚ĖĄ‚Ėą
dwindle {
  pseudotile = true
  preserve_split = true # you probably want this
}

# ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą   ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚Ėą ‚Ėą‚ĖĎ‚ĖĎ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ
# ‚ĖÄ‚ĖĄ‚ĖÄ‚ĖĄ‚ĖÄ ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖÄ ‚Ėą‚ĖĄ‚Ėą ‚ĖÄ‚ĖĄ‚ĖÄ‚ĖĄ‚ĖÄ   ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ ‚Ėą‚Ėą‚ĖĄ ‚ĖĄ‚Ėą

# Set a floating windows
windowrule = match:class file_progress, float on
windowrule = match:class confirm, float on 
windowrule = match:class dialog, float on
windowrule = match:class download, float on
windowrule = match:class notification, float on
windowrule = match:class error, float on
windowrule = match:class splash, float on
windowrule = match:class confirmreset, float on
windowrule = match:class pavucontrol-qt, float on 
windowrule = match:class xfmpc, float on
windowrule = match:class org.kde.ark, float on

# Browser Picture in Picture
windowrule = float on, match:title Picture-in-Picture
windowrule = pin on, match:title Picture-in-Picture

# Set fullscreen for all steam games
windowrule = fullscreen on, match:class steam_app_.*
windowrule = match:class SDL Application, float on

# ‚Ėą‚ĖĄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖÄ
# ‚Ėą‚ĖĎ‚Ėą ‚Ėą‚Ėą‚ĖĄ ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą‚ĖĄ‚Ėą ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖÄ ‚ĖĄ‚Ėą
$MOD = SUPER

# ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ ‚Ėą‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ
# ‚ĖĄ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚ĖĄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ
bind = ,Print, exec, ~/.local/scripts/screenshot.sh --monitor
bind = SHIFT, Print, exec, ~/.local/scripts/screenshot.sh --selection
bind = CTRL, Print, exec, ~/.local/scripts/screenshot.sh --active

# ‚Ėą‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚ĖĎ ‚Ėą‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ
# ‚ĖÄ‚ĖĄ‚ĖÄ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą ‚Ėą‚Ėą‚ĖĄ
bind = , XF86AudioRaiseVolume, exec, ~/.local/scripts/audio.sh vol up 5   
bind = , XF86AudioLowerVolume, exec, ~/.local/scripts/audio.sh vol down 5
bind = , XF86AudioMute, exec, ~/.local/scripts/audio.sh vol toggle

# ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ
# ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖĄ‚ĖÄ
binde=, XF86AudioPrev, exec, mpc prev
binde=, XF86AudioNext, exec, mpc next
binde=, XF86AudioPlay, exec, mpc toggle
binde=, XF86AudioStop, exec, mpc stop     

# ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ
# ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚ĖĄ‚Ėą
bind = $MOD, E, exec, dolphin
bind = $MOD, RETURN, exec, kitty
bind = $MOD, F, exec, firefox
bind = $MOD SHIFT, F, exec, firefox --private-window
bind = $MOD, M, exec, wlogout
bind = $MOD, L, exec, swaylock 
bind = $MOD, R, exec, wofi
bind = $MOD SHIFT, R, exec, hyprctl reload

# ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą   ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ
# ‚ĖÄ‚ĖĄ‚ĖÄ‚ĖĄ‚ĖÄ ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖÄ ‚Ėą‚ĖĄ‚Ėą ‚ĖÄ‚ĖĄ‚ĖÄ‚ĖĄ‚ĖÄ   ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ
bind = $MOD, Q, killactive
bind = $MOD, F11, fullscreen
bind = $MOD, V, togglefloating
bind = $MOD, P, pseudo # dwindle
bind = $MOD, S, togglesplit # dwindle
bind = $MOD, T, togglegroup

